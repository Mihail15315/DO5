version: '3.8'

services:
  # 1. Первый контейнер с нашим приложением на Си (из Части 5)
  web_app:
    build: .
    image: my_fcgi_app:v1
    container_name: fcgi_backend
    restart: always
    # Порты наружу не мапим, EXPOSE не используем. Контейнер скрыт в локальной сети.

  # 2. Второй контейнер с официальным Nginx-прокси
  nginx_proxy:
    image: nginx:latest
    container_name: nginx_balancer
    ports:
      # Замапливаем 8080 порт второго контейнера на 80 порт локальной машины по ТЗ
      - "80:8080"
    volumes:
      # Пробрасываем наш настроенный nginx.conf внутрь прокси-контейнера
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web_app
    restart: always
